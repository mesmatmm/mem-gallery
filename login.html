<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEM Gallery — Admin Login</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0f0f0f;
            font-family: 'Inter', system-ui, sans-serif;
            color: #e0e0e0;
        }

        .card {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 14px;
            padding: 48px 40px;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.5);
        }

        .logo {
            text-align: center;
            margin-bottom: 36px;
        }

        .logo-icon {
            width: 52px;
            height: 52px;
            margin: 0 auto 14px;
            background: rgba(201,169,110,0.1);
            border: 1px solid rgba(201,169,110,0.25);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo h1 {
            font-size: 1.4rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            color: #c9a96e;
        }

        .logo p {
            font-size: 0.75rem;
            color: #555;
            margin-top: 4px;
            text-transform: uppercase;
            letter-spacing: 0.12em;
        }

        .form-group { margin-bottom: 18px; }

        label {
            display: block;
            font-size: 0.75rem;
            color: #888;
            margin-bottom: 7px;
            text-transform: uppercase;
            letter-spacing: 0.09em;
        }

        .input-wrap {
            position: relative;
        }

        .input-wrap svg {
            position: absolute;
            left: 13px;
            top: 50%;
            transform: translateY(-50%);
            color: #555;
            pointer-events: none;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 11px 14px 11px 38px;
            background: #111;
            border: 1px solid #2e2e2e;
            border-radius: 8px;
            color: #e0e0e0;
            font-size: 0.92rem;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input:focus {
            border-color: #c9a96e;
            box-shadow: 0 0 0 3px rgba(201,169,110,0.1);
        }

        .toggle-pw {
            position: absolute;
            right: 11px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: #555;
            padding: 4px;
            display: flex;
            transition: color 0.15s;
        }

        .toggle-pw:hover { color: #999; }

        button[type="submit"] {
            width: 100%;
            margin-top: 8px;
            padding: 13px;
            background: #c9a96e;
            color: #0f0f0f;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, opacity 0.2s, transform 0.1s;
            letter-spacing: 0.02em;
        }

        button[type="submit"]:hover:not(:disabled) { background: #d4b87a; }
        button[type="submit"]:active:not(:disabled) { transform: scale(0.99); }
        button[type="submit"]:disabled { opacity: 0.55; cursor: not-allowed; }

        .error {
            margin-top: 14px;
            padding: 10px 14px;
            background: #2a1414;
            border: 1px solid #5a2828;
            border-radius: 7px;
            color: #e07070;
            font-size: 0.83rem;
            display: none;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">
            <div class="logo-icon">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#c9a96e" stroke-width="1.8">
                    <rect x="3" y="11" width="18" height="11" rx="2"/>
                    <path d="M7 11V7a5 5 0 0110 0v4"/>
                </svg>
            </div>
            <h1>MEM Gallery</h1>
            <p>Admin Panel</p>
        </div>

        <form id="loginForm" autocomplete="on">
            <div class="form-group">
                <label for="username">Username</label>
                <div class="input-wrap">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/>
                    </svg>
                    <input type="text" id="username" placeholder="Username" autofocus autocomplete="username">
                </div>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <div class="input-wrap">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/>
                    </svg>
                    <input type="password" id="password" placeholder="Password" autocomplete="current-password">
                    <button type="button" class="toggle-pw" id="togglePw" aria-label="Show password">
                        <svg id="eyeOpen" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                        </svg>
                        <svg id="eyeClosed" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none">
                            <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/>
                            <line x1="1" y1="1" x2="23" y2="23"/>
                        </svg>
                    </button>
                </div>
            </div>

            <button type="submit" id="btn">Sign In</button>
            <div class="error" id="error"></div>
        </form>
    </div>

    <script>
        // Toggle password visibility
        document.getElementById('togglePw').addEventListener('click', () => {
            const input = document.getElementById('password');
            const isText = input.type === 'text';
            input.type = isText ? 'password' : 'text';
            document.getElementById('eyeOpen').style.display  = isText ? '' : 'none';
            document.getElementById('eyeClosed').style.display = isText ? 'none' : '';
        });

        document.getElementById('loginForm').addEventListener('submit', async e => {
            e.preventDefault();
            const btn      = document.getElementById('btn');
            const errorEl  = document.getElementById('error');
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            if (!username || !password) {
                errorEl.textContent = 'Please enter both username and password';
                errorEl.style.display = 'block';
                return;
            }

            btn.disabled    = true;
            btn.textContent = 'Signing in…';
            errorEl.style.display = 'none';

            try {
                const res = await fetch('/api/auth', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: `username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}`
                });
                const data = await res.json();
                if (data.ok) {
                    window.location.href = '/';
                } else {
                    errorEl.textContent = data.error || 'Invalid credentials';
                    errorEl.style.display = 'block';
                }
            } catch (_) {
                errorEl.textContent = 'Could not connect to admin server';
                errorEl.style.display = 'block';
            }

            btn.disabled    = false;
            btn.textContent = 'Sign In';
        });
    </script>
</body>
</html>
