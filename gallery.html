    <!-- Header image strip -->
    <script>
    (function () {
        function buildStrip() {
            const track = document.getElementById('headerStripTrack');
            if (!track || typeof galleryData === 'undefined') return;

            // All images in a fresh random order every page load
            const picks = [...galleryData].sort(() => Math.random() - 0.5);

            // Build two identical sets for seamless infinite loop
            [picks, picks].forEach(set => {
                set.forEach(item => {
                    const img = document.createElement('img');
                    img.src = item.thumbnail;
                    img.alt = item.folder;
                    img.className = 'strip-img';
                    img.loading = 'lazy';
                    img.addEventListener('click', () => {
                        const filterBtn = document.querySelector(
                            `.filter-btn[data-filter="${item.folder}"], .filter-more-dropdown .filter-btn[data-filter="${item.folder}"]`
                        );
                        if (filterBtn) filterBtn.click();
                        document.querySelector('.gallery-section')
                            ?.scrollIntoView({ behavior: 'smooth' });
                    });
                    track.appendChild(img);
                });
            });

            // ~2.5s per image keeps the same visual speed regardless of total count
            track.style.animationDuration = (picks.length * 2.5) + 's';
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', buildStrip);
        } else {
            buildStrip();
        }
    })();
    </script>
