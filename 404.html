<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Page not found - MEM Gallery">
    <link rel="stylesheet" href="assets/css/main.css">
    <title>404 - Page Not Found</title>
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="navbar-container">
            <div class="logo">
                <a href="index.html">MEM Gallery</a>
            </div>

            <button class="hamburger" id="hamburger" aria-label="Toggle menu">
                <span></span>
                <span></span>
                <span></span>
            </button>

            <ul class="nav-menu" id="navMenu">
                <li><a href="index.html" class="nav-link">Home</a></li>
                <li><a href="gallery.html" class="nav-link">Gallery</a></li>
                <li><a href="about.html" class="nav-link">About</a></li>
                <li><a href="contact.html" class="nav-link">Contact</a></li>
            </ul>

            <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark/light mode">
                <span class="theme-icon">🌙</span>
            </button>

            <button class="music-toggle" id="musicToggle" aria-label="Toggle background music" title="Toggle music">
                <svg id="musicIconOn" width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 3v10.55A4 4 0 1014 17V7h4V3h-6z"/>
                </svg>
                <svg id="musicIconOff" width="20" height="20" viewBox="0 0 24 24" fill="currentColor" style="display:none">
                    <path d="M12 3v10.55A4 4 0 1014 17V7h4V3h-6z" opacity="0.3"/>
                    <line x1="3" y1="3" x2="21" y2="21" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
            </button>
        </div>
    </nav>

    <!-- Main Content -->
    <main id="main-content" style="min-height: calc(100vh - 200px); display: flex; align-items: center; justify-content: center;">
        <div class="container" style="text-align: center;">
            <h1 style="font-size: 4rem; margin-bottom: 1rem;">404</h1>
            <h2 style="font-size: 1.5rem; margin-bottom: 1rem;">Page Not Found</h2>
            <p style="margin-bottom: 2rem; opacity: 0.8;">
                Sorry, the page you're looking for doesn't exist or has been moved.
            </p>
            <a href="index.html" class="btn btn-primary">Return to Home</a>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-content">
            <p>&copy; 2026 MEM Gallery. All rights reserved.</p>
        </div>
    </footer>

    <!-- GSAP Library for Advanced Animations -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    <script>
        gsap.registerPlugin(ScrollTrigger);
    </script>

    <!-- Site Scripts -->
    <script src="assets/js/theme.js"></script>
    <script src="assets/js/gallery.js"></script>
    <script src="assets/js/transitions.js"></script>
    <script src="assets/js/music.js"></script>
</body>
</html>
